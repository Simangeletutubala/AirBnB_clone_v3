<!DOCTYPE html>
<HTML lang="en">
    <head>
        <meta charset="utf-8">
        <title>HBNB</title>
    </head>
    <BODY>
        <H1>States</H1>
        <UL>
          {% if states %}
            {% for state in states.values()|sort(attribute='name') %}
            <LI>
                {{ state['id'] }}: <B>{{ state['name'] }}</B>
                <UL>
                  {% for city in state.cities|sort(attribute='name') %}
                    <LI>
                      {{ city.id }}: <B>{{ city.name }}</B>
                    </LI>
                  {% endfor %}
                </UL>
            </LI>
            {% endfor %}
          {% endif %}
        </UL>
    </BODY>
</HTML>
